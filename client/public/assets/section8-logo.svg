<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Section8Studios local logo</title>
  <desc id="desc">A local fallback logo for Section8Studios using an eight-ball and barber pole motif.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="1" stop-color="#2a2426"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8f536b"/>
      <stop offset="1" stop-color="#c75d72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>
  <circle cx="256" cy="236" r="142" fill="#f7f4ef" filter="url(#shadow)"/>
  <circle cx="256" cy="236" r="124" fill="#101010"/>
  <circle cx="256" cy="196" r="49" fill="#f7f4ef"/>
  <text x="256" y="215" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#111111">8</text>
  <path d="M112 385c51-33 97-49 144-49s93 16 144 49" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  <text x="256" y="420" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="3" fill="#f7f4ef">SECTION 8</text>
  <text x="256" y="456" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="5" fill="#c7b9bd">STUDIOS</text>
</svg>
